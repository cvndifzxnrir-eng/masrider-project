{% extends 'masrider/base.html' %}
{% block title %}ยืนยันการลบประวัติ{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <div style="font-size:3rem;">⚠️</div>
            <h4 class="mt-3">ยืนยันการลบประวัติการต่อสู้</h4>
            <p class="text-muted">
                <strong>{{ comp.event_name }}</strong><br>
                {{ comp.rider }} vs {{ comp.opponent }}
            </p>
            <div class="d-flex gap-2 justify-content-center mt-3">
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> ยืนยันการลบ</button>
                </form>
                <a href="{% url 'rider_detail' comp.rider.pk %}" class="btn btn-outline-secondary">ยกเลิก</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
