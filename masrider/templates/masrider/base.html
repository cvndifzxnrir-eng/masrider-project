<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ระบบจัดการมาสไรเดอร์{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --rider-red: #c0392b;
            --rider-dark: #1a1a2e;
            --rider-accent: #e74c3c;
        }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--rider-dark), #16213e) !important; }
        .navbar-brand { font-weight: 700; font-size: 1.4rem; color: var(--rider-accent) !important; }
        .navbar-brand span { color: white; }
        .card { border: none; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-radius: 12px; }
        .btn-primary { background: var(--rider-accent); border-color: var(--rider-accent); }
        .btn-primary:hover { background: var(--rider-red); border-color: var(--rider-red); }
        .badge-showa { background-color: #8e44ad; }
        .badge-heisei { background-color: #2980b9; }
        .badge-reiwa { background-color: #27ae60; }
        .stat-card { border-left: 4px solid var(--rider-accent); }
        .rider-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #c0392b, #e74c3c);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem; font-weight: bold; flex-shrink: 0; }
        .power-bar { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #e74c3c, #f39c12); }
        footer { background: var(--rider-dark); color: #aaa; }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            🦟 มาส<span>ไรเดอร์</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}"><i class="bi bi-house"></i> หน้าแรก</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'rider_list' %}"><i class="bi bi-people"></i> รายชื่อมาสไรเดอร์</a>
                </li>
            </ul>
            <a href="{% url 'rider_create' %}" class="btn btn-danger btn-sm">
                <i class="bi bi-plus-circle"></i> เพิ่มมาสไรเดอร์
            </a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i> {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<footer class="py-3 mt-5">
    <div class="container text-center">
        <small>ระบบจัดการข้อมูลมาสไรเดอร์ &copy; 2024 — Kamen Rider Database System</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
